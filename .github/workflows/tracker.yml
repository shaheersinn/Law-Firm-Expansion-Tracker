name: Law Firm Expansion Tracker

on:
  schedule:
    # Collect signals every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: 'collect' (default) or 'digest'"
        required: false
        default: "collect"
      firm:
        description: "Single firm ID to test (e.g. osler)"
        required: false
        default: ""

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # was 90 — rate-limit fix means runs complete in <15 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: lawfirm-db-${{ github.run_id }}
          restore-keys: lawfirm-db-

      - name: Run tracker — scheduled collect
        if: github.event_name == 'schedule'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
          CANLII_API_KEY:     ${{ secrets.CANLII_API_KEY }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          SIGNAL_LOOKBACK_DAYS: "21"
        run: python main.py

      - name: Run tracker — manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
          CANLII_API_KEY:     ${{ secrets.CANLII_API_KEY }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          SIGNAL_LOOKBACK_DAYS: "21"
        run: |
          if [ "${{ github.event.inputs.mode }}" = "digest" ]; then
            python main.py --digest
          elif [ -n "${{ github.event.inputs.firm }}" ]; then
            python main.py --firm ${{ github.event.inputs.firm }}
          else
            python main.py
          fi


      - name: Commit dashboard to docs/
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ --force
          git diff --cached --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload tracker log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14
