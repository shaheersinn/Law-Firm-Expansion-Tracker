name: Law Firm Expansion Tracker

on:
  schedule:
    # Full collect run — daily 7 AM UTC
    - cron: "0 7 * * *"
    # Self-learning evolution — every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "collect"
        type: choice
        options:
          - collect
          - digest
          - evolve
          - dashboard
      firm:
        description: "Single firm ID (e.g. osler) — blank = all firms"
        required: false
        default: ""

permissions:
  contents: write   # needed to commit dashboard to docs/

jobs:
  track:
    name: "Collect & Alert"
    runs-on: ubuntu-latest
    # Run on schedule (daily) OR manual dispatch that is NOT evolve/dashboard
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'evolve' && github.event.inputs.mode != 'dashboard')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:       ${{ secrets.DASHBOARD_URL }}
          CANLII_API_KEY:      ${{ secrets.CANLII_API_KEY }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          SIGNAL_LOOKBACK_DAYS: 21
        run: |
          if [ "${{ github.event.inputs.mode }}" = "digest" ]; then
            python main.py --digest --dashboard
          elif [ -n "${{ github.event.inputs.firm }}" ]; then
            python main.py --firm ${{ github.event.inputs.firm }}
          else
            python main.py --dashboard
          fi

      - name: Commit dashboard to docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push

      - name: Upload tracker log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14

  evolve:
    name: "Self-Learning Evolution"
    runs-on: ubuntu-latest
    # Run on 2-hour schedule OR manual evolve dispatch
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 */2 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evolve')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Run evolution cycle
        run: python main.py --evolve

      - name: Upload evolution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolve-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 7

  dashboard:
    name: "Regenerate Dashboard"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dashboard'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Generate dashboard
        run: python main.py --digest --dashboard

      - name: Commit dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate dashboard [skip ci]"
          git push
