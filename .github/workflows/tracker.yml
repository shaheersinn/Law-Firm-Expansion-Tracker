name: Law Firm Expansion Tracker

on:
  schedule:
    # Daily full collect at 07:00 UTC
    - cron: "0 7 * * *"
    # Weekly digest on Sunday at 09:00 UTC
    - cron: "0 9 * * 0"
    # Daily self-learning evolution at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "collect"
        type: choice
        options:
          - collect
          - digest
          - evolve
          - dashboard
      firm:
        description: "Single firm ID (e.g. osler) — leave blank for all"
        required: false
        default: ""

jobs:
  track:
    name: Collect & Alert
    runs-on: ubuntu-latest
    if: >
      success() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
        (github.event_name == 'workflow_dispatch' &&
         github.event.inputs.mode != 'evolve' &&
         github.event.inputs.mode != 'dashboard')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
          CANLII_API_KEY:     ${{ secrets.CANLII_API_KEY }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          SIGNAL_LOOKBACK_DAYS: "21"
        run: |
          if [ "${{ github.event.inputs.mode }}" = "digest" ]; then
            python main.py --digest
          elif [ -n "${{ github.event.inputs.firm }}" ]; then
            python main.py --firm ${{ github.event.inputs.firm }}
          else
            python main.py
          fi

      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}

      - name: Commit dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14

  evolve:
    name: Self-Learning Evolution
    runs-on: ubuntu-latest
    if: >
      success() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 8 * * *') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evolve')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-evolve-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Run evolution
        run: python main.py --evolve

      - name: Save DB cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: law_firm_tracker.db
          key: tracker-db-evolve-${{ github.run_id }}

      - name: Commit learned weights
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learned_weights.json || true
          git diff --cached --quiet || git commit -m "chore: update learned weights [skip ci]"
          git push

  dashboard:
    name: Regenerate Dashboard
    runs-on: ubuntu-latest
    if: >
      success() && (
        github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dashboard'
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-dash-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Regenerate dashboard
        run: python main.py --dashboard

      - name: Commit dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate dashboard [skip ci]"
          git push
