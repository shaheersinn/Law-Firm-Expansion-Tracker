# Law Firm Expansion Tracker — GitHub Actions Workflow
# Fixed: added contents: write so github-actions[bot] can push dashboard updates

name: Law Firm Tracker

on:
  schedule:
    - cron: "0 7 * * *"   # Daily collect & alert
    - cron: "0 8 * * *"   # Daily self-learning evolution
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: leave blank for normal run, or: digest | evolve | dashboard"
        required: false
        default: "collect"
        type: choice
        options:
          - collect
          - digest
          - evolve
          - dashboard
      firm:
        description: "Optional: run against a single firm name (e.g. Osler)"
        required: false
        default: ""
        type: string

# ── FIX 1: was "Contents: read" — bot could not push docs/index.html ────────
# ── FIX 2: removed "metadata: read" — not a valid Actions permission scope ──
permissions:
  contents: write   # Required for: git push docs/ after dashboard regen

env:
  DB_CACHE_VERSION: v5
  SIGNAL_LOOKBACK_DAYS: 21

jobs:
  # ── 1. Collect signals & send Telegram alerts ──────────────────────────────
  track:
    name: Collect & Alert
    runs-on: ubuntu-latest
    if: >
      success() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
        (github.event_name == 'workflow_dispatch' &&
         github.event.inputs.mode != 'evolve' &&
         github.event.inputs.mode != 'dashboard')
      )
    # Handles: mode=collect (default), mode=digest, mode=<blank>, or single-firm runs

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: Linux-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: Linux-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ env.DB_CACHE_VERSION }}-${{ github.run_id }}
          restore-keys: tracker-db-${{ env.DB_CACHE_VERSION }}-

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
          CANLII_API_KEY:     ${{ secrets.CANLII_API_KEY }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          SIGNAL_LOOKBACK_DAYS: ${{ env.SIGNAL_LOOKBACK_DAYS }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          FIRM="${{ github.event.inputs.firm }}"
          if [ "$MODE" = "digest" ]; then
            python main.py --digest
          elif [ -n "$FIRM" ]; then
            python main.py --firm "$FIRM"
          else
            python main.py
          fi

      - uses: actions/cache/save@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ env.DB_CACHE_VERSION }}-${{ github.run_id }}

      - name: Commit & push dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push
        # Note: push now works because permissions.contents = write above

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14

  # ── 2. Regenerate dashboard only (manual trigger) ──────────────────────────
  dashboard:
    name: Regenerate Dashboard
    runs-on: ubuntu-latest
    if: >
      success() && (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.mode == 'dashboard'
      )

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ env.DB_CACHE_VERSION }}-${{ github.run_id }}
          restore-keys: tracker-db-${{ env.DB_CACHE_VERSION }}-
      - name: Regenerate dashboard
        run: python main.py --dashboard-only
      - name: Commit & push dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate dashboard [skip ci]"
          git push

  # ── 3. Self-learning evolution (daily 08:00 UTC or manual) ─────────────────
  evolve:
    name: Self-Learning Evolution
    runs-on: ubuntu-latest
    if: >
      success() && (
        (github.event_name == 'schedule' && github.event.schedule == '0 8 * * *') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evolve')
      )

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ env.DB_CACHE_VERSION }}-${{ github.run_id }}
          restore-keys: tracker-db-${{ env.DB_CACHE_VERSION }}-
      - name: Evolve model
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
        run: python main.py --evolve
      - name: Commit evolved model state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ model_state/ 2>/dev/null || git add docs/
          git diff --cached --quiet || git commit -m "chore: self-learning evolution [skip ci]"
          git push
