name: Law Firm Expansion Tracker

on:
  schedule:
    # Full collect + alert — daily 7 AM UTC
    - cron: "0 7 * * *"
    # Self-learning evolution — every 2 hours
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "collect"
        type: choice
        options:
          - collect
          - digest
          - evolve
          - dashboard

permissions:
  contents: write

jobs:
  # ── Collect + Alert ───────────────────────────────────────────────────────
  track:
    name: "Collect & Alert"
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.mode != 'evolve' &&
       github.event.inputs.mode != 'dashboard')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:        ${{ secrets.DASHBOARD_URL }}
          CANLII_API_KEY:       ${{ secrets.CANLII_API_KEY }}
          GITHUB_RUN_ID:        ${{ github.run_id }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          SIGNAL_LOOKBACK_DAYS: 21
        run: |
          if [ "${{ github.event.inputs.mode }}" = "digest" ]; then
            python main.py --digest
          else
            python main.py
          fi

      - name: Save database to cache
        uses: actions/cache/save@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}

      - name: Commit dashboard to docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push

      - name: Upload tracker log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14

  # ── Self-Learning Evolution (every 2 hours) ───────────────────────────────
  evolve:
    name: "Self-Learning Evolution"
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 */2 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evolve')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # BUG-9 FIX: restore DB, evolve, then SAVE back
      - name: Restore database
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-evolve-${{ github.run_id }}
          restore-keys: |
            tracker-db-evolve-
            tracker-db-

      - name: Run evolution cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python main.py --evolve

      # BUG-9 FIX: save updated DB with evolved weights back to cache
      - name: Save database with evolved weights
        uses: actions/cache/save@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}-evolved

      - name: Upload evolution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evolve-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 7

  # ── Dashboard only ────────────────────────────────────────────────────────
  dashboard:
    name: "Regenerate Dashboard"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'dashboard'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: tracker-db-${{ github.run_id }}
          restore-keys: tracker-db-

      - name: Regenerate dashboard
        run: python main.py --digest

      - name: Commit dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate dashboard [skip ci]"
          git push
