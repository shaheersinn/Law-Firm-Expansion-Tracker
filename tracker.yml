name: Law Firm Expansion Tracker

on:
  schedule:
    - cron: "0 7 * * *"    # Daily collect, 7 AM UTC
    - cron: "0 9 * * 0"    # Sunday digest, 9 AM UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "collect | digest | dashboard | firm"
        required: false
        default: "collect"
      firm:
        description: "Single firm ID to test (e.g. osler)"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: law_firm_tracker.db
          key: lawfirm-db-${{ github.run_id }}
          restore-keys: lawfirm-db-

      - name: Ensure docs dir
        run: mkdir -p docs

      - name: Daily collect
        if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_SERVER_URL:  ${{ github.server_url }}
        run: python main.py

      - name: Sunday digest
        if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * 0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_SERVER_URL:  ${{ github.server_url }}
        run: python main.py --digest

      - name: Manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_SERVER_URL:  ${{ github.server_url }}
        run: |
          case "${{ github.event.inputs.mode }}" in
            digest)    python main.py --digest ;;
            dashboard) python main.py --dashboard ;;
            firm)      python main.py --firm "${{ github.event.inputs.firm }}" ;;
            *)         python main.py ;;
          esac

      - name: Commit dashboard
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --cached --quiet || git commit -m "chore: dashboard update [skip ci]"
          git push || true

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tracker-log-${{ github.run_id }}
          path: tracker.log
          retention-days: 14
